<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ringtail</title>
    <style>
      /* The boot splash — shown for ~1s while the daemon sidecar comes up, then the
         shell navigates this window to the live cockpit. Night Shift cream, self-
         contained (strict CSP, no external assets). */
      :root { --bg: #f6eddd; --ink: #211a1e; --ink-soft: #6e5e52; --amber: #f5a524; --line: #e4d8c4; }
      * { margin: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 18px; background: var(--bg); color: var(--ink);
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
        -webkit-user-select: none; user-select: none; cursor: default;
      }
      .mark {
        width: 54px; height: 54px; border-radius: 14px;
        background: var(--amber); border: 2px solid var(--ink);
        display: grid; place-items: center; font-weight: 700; font-size: 26px;
        box-shadow: 0 8px 24px -10px rgba(33, 26, 30, 0.35);
        animation: bob 2.4s ease-in-out infinite;
      }
      h1 { font-size: 20px; letter-spacing: -0.02em; }
      p { font-size: 12px; color: var(--ink-soft); letter-spacing: 0.04em; }
      .spin {
        width: 18px; height: 18px; border-radius: 50%;
        border: 2px solid color-mix(in srgb, var(--amber) 25%, transparent);
        border-top-color: var(--amber); animation: spin 700ms linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      @media (prefers-reduced-motion: reduce) { .mark, .spin { animation: none; } }
    </style>
  </head>
  <body>
    <div class="mark" aria-hidden="true">🦝</div>
    <h1>ringtail</h1>
    <div class="spin" aria-label="starting"></div>
    <p>raiding the daemon… one moment</p>
  </body>
</html>
