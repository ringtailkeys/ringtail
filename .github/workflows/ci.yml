name: CI

# The guarantee + the module boundaries fail the build in CI, not just locally.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    # One project's tsc is heavy (peaks ~6GB); give it real headroom on the 16GB
    # public runner so typecheck/lint don't OOM. TODO: bisect which project + why
    # (suspected: a type-heavy dep pulled during a lockfile regen) and trim it.
    env:
      NODE_OPTIONS: --max-old-space-size=10240
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.34

      - name: Install
        run: bun install --frozen-lockfile

      # --parallel=1: one project's tsc is heavy (~6GB+); running 3-wide (nx default)
      # lets the parallel processes collectively exceed the 16GB runner and OOM.
      # Serialize so the heavy one gets the whole box.
      - name: Typecheck
        run: bunx nx run-many -t typecheck --parallel=1

      - name: Lint (module boundaries)
        run: bunx nx run-many -t lint --parallel=1

      - name: THE GUARANTEE (no secret ever reaches the agent)
        run: bun run check:no-leak

      - name: E2E (offline credential lifecycle)
        run: cd libs/core && bun test

  # Docs are part of done: the public surface (CLI · MCP tools · Wizard/Step/Action ·
  # the .env.example manifest) must be documented, and apps/docs must build. Same
  # "enforced, not suggested" gate as the boundary lint and check:no-leak.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.34

      - name: Install
        run: bun install --frozen-lockfile

      - name: Docs in sync with the code + apps/docs builds
        run: bun run check:docs
