name: Publish

# Hands-free npm release of `ringtailkeys`, published via OIDC Trusted Publishing.
# NO npm token lives anywhere: `id-token: write` lets npm's registry verify this
# workflow's OIDC identity against the Trusted Publisher configured on the package
# (npmjs.com → ringtailkeys → Settings → Trusted Publisher). See packages/cli/PUBLISH.md.
#
# Fired by the tag the Tilt `release` button pushes (`git push --follow-tags`), NOT
# by a manual `npm publish`. Runs on Linux so esbuild works (it HANGS on the dev mac).
on:
  push:
    tags: ['v*']

permissions:
  id-token: write   # REQUIRED for OIDC Trusted Publishing (the token exchange)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.34

      # Node + a recent npm: Trusted Publishing needs npm >= 11.5.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm (Trusted Publishing needs >= 11.5)
        run: npm i -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      # Fail fast if the pushed tag doesn't match the package version — the tag is
      # the source of truth for WHAT ships; a mismatch means the bump/tag drifted.
      - name: Guard — tag matches packages/cli/package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./packages/cli/package.json').version")
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "REFUSE: tag v$TAG != package.json v$PKG"; exit 1
          fi

      # prepack builds cli.js + daemon.js + dashboard bundles (esbuild fine on Linux).
      - name: Build the tarball artifacts
        run: cd packages/cli && bun run prepack

      # OIDC Trusted Publishing: no NODE_AUTH_TOKEN, no secret. npm exchanges the
      # workflow's OIDC token for a short-lived publish grant automatically.
      - name: Publish to npm (provenance)
        run: cd packages/cli && npm publish --provenance --access public
