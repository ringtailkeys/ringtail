name: Publish

# Hands-free npm release of `ringtailkeys`, published via OIDC Trusted Publishing.
# NO npm token lives anywhere: `id-token: write` lets npm's registry verify this
# workflow's OIDC identity against the Trusted Publisher configured on the package
# (npmjs.com → ringtailkeys → Settings → Trusted Publisher). See packages/cli/PUBLISH.md.
#
# Fired by the tag the Tilt `release` button pushes (`git push --follow-tags`), NOT
# by a manual `npm publish`. Runs on Linux so esbuild works (it HANGS on the dev mac).
on:
  push:
    tags: ['v*']

permissions:
  id-token: write   # REQUIRED for OIDC Trusted Publishing (the token exchange)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      # Node + a recent npm: Trusted Publishing needs npm >= 11.5.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Upgrade npm (Trusted Publishing needs >= 11.5)
        run: npm i -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      # Fail fast if the pushed tag doesn't match the package version — the tag is
      # the source of truth for WHAT ships; a mismatch means the bump/tag drifted.
      - name: Guard — tag matches packages/cli/package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./packages/cli/package.json').version")
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "REFUSE: tag v$TAG != package.json v$PKG"; exit 1
          fi

      # prepack builds cli.js + daemon.js + dashboard bundles (esbuild fine on Linux).
      - name: Build the tarball artifacts
        run: cd packages/cli && bun run prepack

      # ── Clean-install smoke gate (fail-closed) ──────────────────────────────
      # WHY THIS EXISTS: ringtailkeys@0.1.0 shipped BROKEN — its package.json carried
      # `workspace:*` RUNTIME deps that npm can't resolve, so a stranger's
      # `npm i ringtailkeys` failed. Every other gate (typecheck/lint/tests/tag-match)
      # PASSED because NOTHING ever installed the packed tarball in a clean env. This
      # step packs the tarball, installs it in a throwaway dir OUTSIDE the workspace,
      # boots the installed bin, and health-checks the daemon. ANY failure exits
      # non-zero → the job fails → `npm publish` below NEVER runs. The pipeline
      # pack-installs and boots the tarball before publishing; a broken install blocks
      # the release. See packages/cli/PUBLISH.md.
      - name: Smoke — pack, clean-install & boot the tarball before publishing
        run: |
          set -euo pipefail
          cd packages/cli
          VERSION=$(node -p "require('./package.json').version")
          npm pack
          TGZ="$PWD/ringtailkeys-${VERSION}.tgz"
          test -f "$TGZ"

          # CHECK 4 — cheap direct guard on the exact 0.1.0 failure: the packed
          # package.json must carry NO runtime `dependencies` using the `workspace:`
          # protocol. Any such value → exit 1 → gate fails → no publish.
          tar -xzO -f "$TGZ" package/package.json | node -e '
            const p = JSON.parse(require("fs").readFileSync(0, "utf8"));
            const bad = Object.entries(p.dependencies || {})
              .filter(([, v]) => String(v).includes("workspace:"));
            if (bad.length) {
              console.error("REFUSE: workspace: protocol in runtime dependencies:", bad);
              process.exit(1);
            }
            console.log("ok: no workspace: protocol in runtime dependencies");
          '

          # CHECK 2 — a real stranger install: fresh temp dir OUTSIDE the package.
          # A `workspace:*` (or any unresolvable) dep makes `npm i` exit non-zero →
          # set -e fails the job → no publish. Then assert the bin was actually linked.
          TMP=$(mktemp -d)
          cd "$TMP"
          npm init -y >/dev/null
          npm i "$TGZ"
          test -x node_modules/.bin/ringtail

          # CHECK 3 — boot smoke: run the INSTALLED bin (shebang uses bun, already set
          # up above), parse the origin it prints, curl the daemon /health, assert
          # {"ok":true}, then stop it. If the daemon never comes up within the window,
          # exit 1 → job fails → no publish. `up` picks a free port, so we parse the
          # printed `http://127.0.0.1:<port>` rather than assume one.
          node_modules/.bin/ringtail up >up.log 2>&1 &
          BIN_PID=$!
          cleanup() { kill "$BIN_PID" 2>/dev/null || true; pkill -P "$BIN_PID" 2>/dev/null || true; }
          trap cleanup EXIT   # if: always()-safe — bg proc killed on both pass and fail
          for _ in $(seq 1 30); do
            ORIGIN=$(grep -oE 'http://127\.0\.0\.1:[0-9]+' up.log | head -1 || true)
            if [ -n "${ORIGIN:-}" ] && curl -fsS "$ORIGIN/health" | grep -q '"ok":true'; then
              echo "ok: daemon healthy at $ORIGIN"
              exit 0
            fi
            sleep 1
          done
          echo "REFUSE: installed bin's daemon never answered /health — smoke FAILED"
          echo "----- up.log -----"; cat up.log
          exit 1

      # OIDC Trusted Publishing: no NODE_AUTH_TOKEN, no secret. npm exchanges the
      # workflow's OIDC token for a short-lived publish grant automatically.
      - name: Publish to npm (provenance)
        run: cd packages/cli && npm publish --provenance --access public
