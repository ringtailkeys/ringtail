# Git hooks — the commit-boundary version of the boundary thesis. The boundary laws
# are enforced in `lint` (Nx) and in review; this stops drift one step earlier: an
# agent (or human) literally can't COMMIT unformatted / unlinted code. Fast by
# construction — staged files only on commit. No pre-push gate (see below).
#
# Enable once after `bun install`:  bunx lefthook install
# Skip in a pinch:                  LEFTHOOK=0 git commit …   (or `git commit --no-verify`)

pre-commit:
  parallel: true
  commands:
    # Oxfmt (Rust) formats just the staged files and re-stages what it fixed.
    format:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: bunx oxfmt {staged_files}
      stage_fixed: true
    # Oxlint (Rust, type-aware) over the staged files only — sub-second.
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: bunx oxlint {staged_files}

# NO pre-push hook — deliberately. There WAS a `bunx nx affected -t typecheck` here; it
# was removed 2026-07-12 after it repeatedly hung real pushes across this fleet: `nx
# affected` deadlocked the Nx daemon 10+ min on worktree pushes, and on a cold cache it
# blocked on Nx's interactive "Share usage data?" stdin prompt — a push has no TTY, so it
# hung until killed. A minutes-long (or infinite) push gate trains people to `--no-verify`,
# which is worse than no gate. Typecheck coverage lives in CI (ci.yml runs
# `nx run-many -t typecheck` on every push/PR) and in editors. Don't re-add a pre-push
# typecheck unless it's provably sub-30s cold from a fresh worktree.
